image: 'appsec4u/worker:YOUR_ID_HERE'
variables:
  # Specify the engagement ID for the scansuite scans:
  ENG: 2
  # Set export_dojo to 'True' to enable exporting results to DefectDojo, or 'False' to disable it:
  EXPORT_DOJO: 'True'
  # Specify the programming language for the SAST scans
  LANG: python
  # Specify the docker image to be scanned in the infra_test stage:
  DOCKER_IMAGE: 'codeclimate/codeclimate-coffeelint'
  # Specify the target website for DAST scans:
  WEBSITE: 'https://ginandjuice.shop'
  HEADERS: 'null'
  COOKIES: 'null'

stages:
  - build
  - sast
  - sca
  - infra_test
  - dynamic
  - prod
before_script:
  - export DOJO_APIKEY=$DOJO_APIKEY
  - export DOJO_HOST=$DOJO_HOST
build:
  stage: build
  image: python:3.6
  before_script:
   - pip3 install --upgrade virtualenv
  script:
   - virtualenv env                       # Create a virtual environment for the python application
   - source env/bin/activate              # Activate the virtual environment
   - pip install -r requirements.txt      # Install the required third party packages as defined in requirements.txt
   - python manage.py check               # Run checks to ensure the application is working fine

# SAST Section
secrets:
  stage: build
  script:
    - scansuite_sast secrets $ENG $EXPORT_DOJO
  allow_failure: true
sast_quick:
  stage: sast
  script:
    - scansuite_sast sast_quick $ENG $EXPORT_DOJO
  allow_failure: true
sast_full:
  stage: sast
  script:
    - scansuite_sast sast_full $ENG $EXPORT_DOJO
  allow_failure: true
sast_python:
  stage: sast
  script:
    - scansuite_sast $LANG $ENG $EXPORT_DOJO
  allow_failure: true

# SCA/OAST Section
dep_checks:
  stage: sca
  script:
    - scansuite_sast dep_checks $ENG $EXPORT_DOJO
  allow_failure: true

# Configs and docker image checks
iacs_kics:
  stage: infra_test
  script:
    - scansuite_sast iacs_kics $ENG $EXPORT_DOJO
  allow_failure: true
image_vulns:
  stage: infra_test
  script:
    - scansuite_infra docker_image_scan $ENG $DOCKER_IMAGE
  allow_failure: true

# DAST Section
dast_quick:
  stage: dynamic
  script:
    - scansuite_dast dast_quick $ENG $WEBSITE $HEADERS $COOKIES
  allow_failure: true
dast_balanced:
  stage: dynamic
  script:
    - scansuite_dast dast_balanced $ENG $WEBSITE $HEADERS $COOKIES
  allow_failure: true
deep_dast_scan:
  stage: dynamic
  script:
    - scansuite_dast zap_full $ENG $WEBSITE $HEADERS $COOKIES
  allow_failure: true
nuclei:
  stage: dynamic
  script:
    - scansuite_dast nuclei $ENG $WEBSITE $HEADERS $COOKIES
  allow_failure: true

# End of scans
production:
  stage: prod
  script:
    - id